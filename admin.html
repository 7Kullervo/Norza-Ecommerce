<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard | Norza</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  body { background: #f4f5f7; font-family: 'Segoe UI', Arial, sans-serif; }
  .admin-topbar {
    background: #14141a;
    color: #fff;
    padding: 14px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .admin-topbar .brand { font-weight: 700; letter-spacing: 1px; }
  .admin-topbar a.logout { color: #d4a72c; text-decoration: none; font-size: 14px; }
  .admin-layout {
    display: flex;
    align-items: flex-start;
    gap: 20px;
    padding: 20px;
    max-width: 1400px;
    margin: 0 auto;
  }
  .admin-nav {
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    width: 190px;
    flex-shrink: 0;
    overflow: hidden;
  }
  .admin-nav button {
    display: block;
    width: 100%;
    text-align: left;
    padding: 13px 16px;
    border: none;
    background: none;
    font-size: 14px;
    cursor: pointer;
    border-bottom: 1px solid #f0f0f0;
  }
  .admin-nav button.active { background: #14141a; color: #d4a72c; font-weight: 600; }
  .admin-nav button:hover:not(.active) { background: #f7f7f7; }

  .admin-main { flex: 1; min-width: 0; }
  .panel {
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    padding: 24px;
    margin-bottom: 20px;
  }
  .panel h2 { font-size: 19px; margin-bottom: 16px; }
  table { font-size: 14px; }
  .stat-cards { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
  .stat-card {
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    padding: 18px 22px;
    min-width: 150px;
    flex: 1;
  }
  .stat-card .label { font-size: 12px; color: #888; text-transform: uppercase; }
  .stat-card .value { font-size: 26px; font-weight: 700; margin-top: 4px; }

  .instructions-box {
    width: 300px;
    flex-shrink: 0;
    background: #fffbea;
    border: 1px solid #f0e0a0;
    border-radius: 10px;
    padding: 18px 20px;
    position: sticky;
    top: 20px;
    font-size: 13.5px;
    color: #5a4a10;
  }
  .instructions-box h5 { font-size: 15px; margin-bottom: 10px; color: #4a3a00; }
  .instructions-box ul { padding-left: 18px; margin-bottom: 0; }
  .instructions-box li { margin-bottom: 10px; line-height: 1.4; }
  .status-badge {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }
  .status-pending_payment { background: #fdecea; color: #b3261e; }
  .status-processing { background: #fff4de; color: #a86a00; }
  .status-shipped { background: #e5f0ff; color: #0b5ed7; }
  .status-delivered { background: #e6f7ec; color: #1b8a4c; }
  .status-cancelled { background: #eee; color: #555; }
  .low-stock { color: #b3261e; font-weight: 600; }
  @media (max-width: 992px) {
    .admin-layout { flex-direction: column; }
    .admin-nav { width: 100%; display: flex; overflow-x: auto; }
    .admin-nav button { white-space: nowrap; border-bottom: none; }
    .instructions-box { width: 100%; position: static; }
  }
</style>
</head>
<body>

<div class="admin-topbar">
  <div class="brand">NORZA ADMIN</div>
  <div>
    <span id="adminName" style="margin-right: 16px; font-size: 14px;"></span>
    <a href="#" class="logout" id="logoutLink">Log Out</a>
  </div>
</div>

<div class="admin-layout">

  <!-- Sidebar nav -->
  <div class="admin-nav">
    <button data-tab="dashboard" class="active">Dashboard</button>
    <button data-tab="products">Products</button>
    <button data-tab="orders">Orders</button>
    <button data-tab="users">Users</button>
    <button data-tab="messages">Messages</button>
  </div>

  <!-- Main content -->
  <div class="admin-main">

    <!-- Dashboard tab -->
    <div class="tab-content" id="tab-dashboard">
      <div class="stat-cards" id="statCards"></div>
      <div class="panel">
        <h2>Low Stock Products (5 or fewer left)</h2>
        <table class="table" id="lowStockTable">
          <thead><tr><th>Product</th><th>Stock</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <!-- Products tab -->
    <div class="tab-content" id="tab-products" style="display:none;">
      <div class="panel">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h2 class="mb-0">Products</h2>
          <button class="btn btn-dark btn-sm" id="addProductBtn">+ Add Product</button>
        </div>
        <table class="table table-hover">
          <thead><tr><th>Image</th><th>Name</th><th>Category</th><th>Price</th><th>Stock</th><th>Actions</th></tr></thead>
          <tbody id="productsTableBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Orders tab -->
    <div class="tab-content" id="tab-orders" style="display:none;">
      <div class="panel">
        <h2>Orders</h2>
        <table class="table table-hover">
          <thead><tr><th>Order #</th><th>Customer</th><th>Total</th><th>Paid</th><th>Status</th></tr></thead>
          <tbody id="ordersTableBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Users tab -->
    <div class="tab-content" id="tab-users" style="display:none;">
      <div class="panel">
        <h2>Users</h2>
        <table class="table table-hover">
          <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Active</th><th>Actions</th></tr></thead>
          <tbody id="usersTableBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Messages tab -->
    <div class="tab-content" id="tab-messages" style="display:none;">
      <div class="panel">
        <h2>Contact Messages</h2>
        <table class="table table-hover">
          <thead><tr><th>From</th><th>Subject</th><th>Message</th><th>Read</th><th>Actions</th></tr></thead>
          <tbody id="messagesTableBody"></tbody>
        </table>
      </div>
    </div>

  </div>

  <!-- Instructions sidebar -->
  <div class="instructions-box" id="instructionsBox"></div>

</div>

<!-- Add/Edit Product Modal -->
<div class="modal fade" id="productModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <form id="productForm">
        <div class="modal-header">
          <h5 class="modal-title" id="productModalTitle">Add Product</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="productId">
          <div class="mb-2">
            <label class="form-label">Name</label>
            <input type="text" class="form-control" id="pName" required>
          </div>
          <div class="mb-2">
            <label class="form-label">Price ($)</label>
            <input type="number" step="0.01" class="form-control" id="pPrice" required>
          </div>
          <div class="mb-2">
            <label class="form-label">Category</label>
            <select class="form-select" id="pCategory" required>
              <option value="clothing">Clothing</option>
              <option value="watches">Watches</option>
              <option value="shoes">Shoes</option>
              <option value="snacks">Snacks</option>
              <option value="produce">Produce</option>
              <option value="electronics">Electronics</option>
              <option value="accessories">Accessories</option>
              <option value="beauty">Beauty</option>
            </select>
          </div>
          <div class="mb-2">
            <label class="form-label">Image URL</label>
            <input type="text" class="form-control" id="pImage" required placeholder="https://...">
          </div>
          <div class="mb-2">
            <label class="form-label">Stock quantity</label>
            <input type="number" class="form-control" id="pStock" required>
          </div>
          <div class="mb-2">
            <label class="form-label">Description (optional)</label>
            <textarea class="form-control" id="pDescription" rows="2"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-dark" id="productSaveBtn">Save</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"></script>
<script src="api.js"></script>
<script src="admin.js"></script>

</body>
</html>
